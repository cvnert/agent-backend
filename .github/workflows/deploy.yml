name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build for Linux
        run: GOOS=linux GOARCH=amd64 go build -o agent-backend .

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            sudo systemctl stop agent-backend || true
            cd /opt/agent/backend
            sudo wget -O agent-backend https://github.com/${{ github.repository }}/releases/download/latest/agent-backend 2>/dev/null || echo "No release, using local build"
            sudo chmod +x agent-backend
            sudo systemctl start agent-backend
